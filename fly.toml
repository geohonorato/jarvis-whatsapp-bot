# fly.toml - Configuração para Fly.io
app = "jarvis-whatsapp-bot"
primary_region = "gru" # São Paulo, Brasil

[build]
  builder = "heroku/buildpacks:20"

[env]
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[[mounts]]
  source = "whatsapp_data"
  destination = "/app/.wwebjs_auth"
  initial_size = "1gb"
