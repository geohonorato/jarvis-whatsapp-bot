services:
  - type: web
    name: jarvis-whatsapp-bot
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: MAGISTERIUM_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CALENDAR_ID
        sync: false
      - key: WHATSAPP_NUMBER
        sync: false
